<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin:0; padding:0; height:100%; width:100%; background:#000; overflow:hidden; }
        video {
            width: 100vw; height: 100vh; object-fit: cover;
            animation: kissCover 5s ease-in-out infinite;
        }
        @keyframes kissCover {
            0% { transform: scale(1); opacity: 1; }
            70% { transform: scale(1.5); }
            90% { transform: scale(5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline>
        <source src="Snapchat-414383175.mp4" type="video/mp4">
    </video>
</body>
